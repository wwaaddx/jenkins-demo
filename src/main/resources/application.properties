server.port=8081

blog.work-dir=/www/my-blog

blog.hexo-command=/www/my-blog/node_modules/.bin/hexo

blog.posts-dir=${blog.work-dir}/source/_posts
blog.images-dir=${blog.work-dir}/source/images

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 日志配置
logging.level.com.example.hexoblogadmin=DEBUG
logging.file.name=logs/hexo-blog-admin.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
